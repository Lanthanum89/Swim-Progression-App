        <button class="edit-btn" onclick="editSession('${s.id}')" title="Edit">✏️</button>
        <button class="del-btn" onclick="deleteSession('${s.id}')" title="Delete">✕</button>
      </div>
      ${_editId === s.id ? `<div class="session-edit-form">
        <div class="edit-row"><input type="date" id="edit-date-${s.id}" value="${s.date}" style="flex:1"></div>
        <div class="edit-row">
          <input type="number" id="edit-dist-${s.id}" value="${s.unit_val != null ? s.unit_val : s.dist_km}" step="any" min="0" inputmode="decimal" style="flex:1">
          <select id="edit-unit-${s.id}" style="width:95px">
            <option value="km" ${(s.unit||'km')==='km'?'selected':''}>km</option>
            <option value="m" ${s.unit==='m'?'selected':''}>m</option>
            <option value="lengths" ${s.unit==='lengths'?'selected':''}>lengths</option>
          </select>
        </div>
        <div class="edit-row"><input type="text" id="edit-note-${s.id}" value="${(s.note||'').replace(/"/g,'&quot;')}" placeholder="Notes" style="flex:1"></div>
        <div class="edit-actions">
          <button class="btn-primary" onclick="saveEditSession('${s.id}')" style="flex:1;padding:11px;font-size:14px;box-shadow:none">Save</button>
          <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>` : ''}`;
    });
    h += `</div>`;
  }

  h += `<hr class="divider">
  <div class="section-title">Backup &amp; restore</div>
  <div class="card" style="display:flex;gap:10px;padding:16px 20px">
    <button class="btn-primary" onclick="exportData()" style="flex:1;padding:13px;display:flex;align-items:center;justify-content:center">Export</button>
    <button class="btn-primary" onclick="document.getElementById('import-file').click()" style="flex:1;padding:13px;display:flex;align-items:center;justify-content:center">Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
  <div style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:-6px;margin-bottom:12px">
    Save the export file to Google Drive to back up your data
  </div>`;

  document.getElementById('history-body').innerHTML = h;
}

function deleteSession(id) {
  if (!confirm('Delete this swim?')) return;
  save(K.sessions, getSessions().filter(s => s.id !== id));
  renderHistory();
  showToast('Swim deleted');
}

// ── Routes panel ─────────────────────────────────────────────────────────────

function renderRoutes() {
  const activeId = getActiveId();
  const all      = getAllRoutes();

  let h = `<div class="section-title">Choose your route</div>`;

  all.forEach(r => {
    const isActive   = r.id === activeId;
    const done       = routeTotal(r.id);
    const pct        = Math.min(100, (done / r.km) * 100);
    const isComplete = done >= r.km;
    const progText   = done > 0 && !isComplete ? ` · ${pct.toFixed(0)}% done` : '';
    const delBtn     = r.custom
      ? `<button class="route-del" onclick="event.stopPropagation();delRoute('${r.id}')" title="Delete">✕</button>`
      : '';

    h += `<div class="route-card ${isActive ? 'active' : ''} ${isComplete ? 'completed' : ''}" onclick="pickRoute('${r.id}')">
      <div class="route-emoji">${r.emoji}</div>
      <div class="route-info">
        <div class="route-name">${r.name}${isActive ? ' ✓' : ''}</div>
        <div class="route-desc">${r.desc}</div>
        <div class="route-meta">
          <span class="route-km">${fmtKm(r.km)}</span>
          ${progText ? `<span class="route-prog">${progText}</span>` : ''}
          ${isComplete ? `<span class="route-badge-done">Completed</span>` : ''}
        </div>
      </div>
      ${delBtn}
    </div>`;
    if (isActive) {
      const goalDate = getGoalDate();
      h += `<div class="route-goal-row">
        <label for="goal-date-input">Target date</label>
        <input type="date" id="goal-date-input" value="${goalDate}" onchange="setGoalDate(this.value)">
      </div>`;
    }
  });

  h += `<hr class="divider">
  <div class="section-title">Add your own route</div>
  <div class="card">
    <div class="form-group">
      <label>Route name</label>
      <input type="text" id="c-name" placeholder="e.g. My local lake">
    </div>
    <div class="form-group">
      <label>Total distance</label>
      <div style="display:grid;grid-template-columns:1fr 90px;gap:8px">
        <input type="number" id="c-dist" placeholder="e.g. 5" min="0.01" step="any">
        <select id="c-unit"><option value="km">km</option><option value="m">metres</option></select>
      </div>
    </div>
    <button class="btn-primary" onclick="addCustomRoute()">Add route</button>
  </div>`;

  document.getElementById('routes-body').innerHTML = h;
}

function pickRoute(id) {
  saveS(K.route, id);
  showToast('Route selected!');
  setTimeout(() => goTo('home'), 0);
}

function addCustomRoute() {
  const name = document.getElementById('c-name').value.trim();
  const dist = parseFloat(document.getElementById('c-dist').value);
  const unit = document.getElementById('c-unit').value;

  if (!name)           { showToast('Please enter a route name'); return; }
  if (!dist || dist <= 0) { showToast('Please enter a distance'); return; }

  const km = unit === 'm' ? dist / 1000 : dist;
  if (km < 0.5) { showToast('Route must be at least 0.5 km'); return; }
  const q  = km / 4;
  const r  = {
    id: 'custom-' + Date.now(),
    name,
    emoji: '🗺️',
    desc: 'Custom route',
    km,
    custom: true,
    milestones: [
      { km: 0,   label: 'Start!' },
      { km: q,   label: '25% of the way' },
      { km: q*2, label: 'Halfway!' },
      { km: q*3, label: '75% done' },
      { km: km,  label: name + ' complete! 🎉' }
    ]
  };

  const customs = getCustoms();
  customs.push(r);
  save(K.customs, customs);
  saveS(K.route, r.id);
  renderRoutes();
  showToast('Route added!');
}

function delRoute(id) {
  if (!confirm('Delete this route and all its swims?')) return;
  save(K.customs,  getCustoms().filter(r => r.id !== id));
  save(K.sessions, getSessions().filter(s => s.route_id !== id));
  if (getActiveId() === id) saveS(K.route, 'nyad');
  renderRoutes();
  showToast('Route deleted');
}

// ── Backup / Restore ─────────────────────────────────────────────────────────

function exportData() {
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    sessions: getSessions(),
    customRoutes: getCustoms(),
    activeRoute: getActiveId(),
    poolLen: getPoolLen(),
    goalDate: getGoalDate(),
    theme: localStorage.getItem('swim_theme') || ''
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'swim-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded!');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.version || !Array.isArray(d.sessions)) { showToast('Invalid backup file'); return; }
      if (!confirm(`Import ${d.sessions.length} swim(s) from backup? This will replace all current data.`)) return;
      save(K.sessions, d.sessions);
      save(K.customs, Array.isArray(d.customRoutes) ? d.customRoutes : []);
      saveS(K.route, typeof d.activeRoute === 'string' && d.activeRoute ? d.activeRoute : 'nyad');
      saveS(K.poolLen, Number.isFinite(parseFloat(d.poolLen)) && parseFloat(d.poolLen) > 0 ? parseFloat(d.poolLen) : 25);
      if (typeof d.goalDate === 'string' && d.goalDate) saveS(K.goalDate, d.goalDate); else localStorage.removeItem(K.goalDate);
      if (typeof d.theme === 'string' && d.theme) setTheme(d.theme);
      showToast(`Imported ${d.sessions.length} swims!`);
      const activePanel = document.querySelector('.panel.active');
      if (activePanel) {
        goTo(activePanel.id.replace('panel-', ''));
      } else {
        renderHome();
      }
    } catch { showToast('Could not read backup file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function setGoalDate(val) {
  if (val) saveS(K.goalDate, val); else localStorage.removeItem(K.goalDate);
  showToast(val ? 'Target date saved' : 'Target date cleared');
}

// ── Toast ────────────────────────────────────────────────────────────────────

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Animations ───────────────────────────────────────────────────────────────

function addRipple(e) {
  const btn  = e.currentTarget;
  const r    = document.createElement('span');
  const rect = btn.getBoundingClientRect();
  r.className   = 'ripple';
  r.style.left  = (e.clientX - rect.left)  + 'px';
  r.style.top   = (e.clientY - rect.top)   + 'px';
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function launchConfetti() {
  const colours   = ['#9333ea','#ec4899','#c084fc','#fbbf24','#34d399','#60a5fa'];
  const container = document.getElementById('app');
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random() * 100}%;
      top:0;
      background:${colours[Math.floor(Math.random() * colours.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      width:${6 + Math.random() * 8}px;
      height:${6 + Math.random() * 8}px;
      animation-duration:${1.2 + Math.random() * 1.4}s;
      animation-delay:${Math.random() * 0.5}s;
    `;
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// Animate cards in when a panel is shown
function animateCards(panelId) {
  document.querySelectorAll(`#${panelId} .card, #${panelId} .stat, #${panelId} .route-card`)
    .forEach((el, i) => {
      el.classList.remove('card-animate');
      void el.offsetWidth; // force reflow
      el.style.animationDelay = `${i * 55}ms`;
      el.classList.add('card-animate');
    });
}

// ── Share ─────────────────────────────────────────────────────────────────────

function shareProgress() {
  const route   = getActiveRoute();
  const totalKm = routeTotal(route.id);
  const pct     = Math.min(100, (totalKm / route.km) * 100);
  const text    = `I've swum ${fmtKm(totalKm)} of ${route.name} — ${pct.toFixed(0)}% done! 🦐 ${route.desc} (${fmtKm(route.km)} total)`;
  navigator.share({ text }).catch(() => {});
}

// ── Stats helpers ─────────────────────────────────────────────────────────────

function thisWeekCount(sessions) {
  const cutoff = new Date(Date.now() - 6 * 86400000).toISOString().split('T')[0];
  const today  = new Date().toISOString().split('T')[0];
  return sessions.filter(s => s.date >= cutoff && s.date <= today).length;
}

function isoWeekKey(dateStr) {
  const d   = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const yr  = d.getFullYear();
  const wk  = Math.ceil(((d - new Date(yr, 0, 1)) / 86400000 + 1) / 7);
  return yr * 100 + wk;
}

function calcStreak(sessions) {
  if (!sessions.length) return 0;
  const weeks  = new Set(sessions.map(s => isoWeekKey(s.date)));
  const today  = new Date();
  const thisWk = isoWeekKey(today.toISOString().split('T')[0]);
  const lastWkD = new Date(today.getTime() - 7 * 86400000);
  const lastWk  = isoWeekKey(lastWkD.toISOString().split('T')[0]);
  let d = weeks.has(thisWk) ? new Date(today) : (weeks.has(lastWk) ? lastWkD : null);
  if (!d) return 0;
  let count = 0;
  while (true) {
    const wk = isoWeekKey(d.toISOString().split('T')[0]);
    if (!weeks.has(wk)) break;
    count++;
    d = new Date(d.getTime() - 7 * 86400000);
  }
  return count;
}

// ── Session edit ──────────────────────────────────────────────────────────────

function editSession(id) {
  _editId = _editId === id ? null : id;
  renderHistory();
}

function cancelEdit() {
  _editId = null;
  renderHistory();
}

function saveEditSession(id) {
  const raw  = parseFloat(document.getElementById('edit-dist-' + id).value);
  const unit = document.getElementById('edit-unit-' + id).value;
  const date = document.getElementById('edit-date-' + id).value;
  const note = document.getElementById('edit-note-' + id).value.trim();
  if (!raw || raw <= 0) { showToast('Please enter a distance'); return; }
  if (!date)            { showToast('Please enter a date');     return; }
  const distKm = toKm(raw, unit);
  save(K.sessions, getSessions().map(s => s.id !== id ? s : { ...s, date, dist_km: distKm, unit, unit_val: raw, note }));
  _editId = null;
  renderHistory();
  showToast('Swim updated');
}

// ── Badges ──────────────────────────────────────────────────────────

const BADGE_DEFS = [
  { id: 'first-swim',      icon: '🏊', label: 'First Swim',      desc: 'Log your very first swim session', check: d => d.totalSwims >= 1 },
  { id: 'first-milestone',  icon: '🎯', label: 'First Milestone', desc: 'Reach a milestone on any route', check: d => d.milestonesHit >= 1 },
  { id: 'open-water',       icon: '🌊', label: 'Open Water',      desc: 'Swim a total of 10 km across all routes', check: d => d.totalKmAll >= 10 },
  { id: 'halfway',          icon: '🏅', label: 'Halfway There',   desc: 'Reach the halfway point on any route', check: d => d.anyHalfway },
  { id: 'route-complete',   icon: '🏆', label: 'Route Complete',  desc: 'Complete an entire route from start to finish', check: d => d.anyComplete },
  { id: '100km',            icon: '💯', label: '100 km Club',     desc: 'Swim 100 km total — a truly epic distance', check: d => d.totalKmAll >= 100 },
  { id: 'consistency',      icon: '🔥', label: 'Consistency',     desc: 'Maintain a 4-week swimming streak', check: d => d.streak >= 4 },
];

function getBadges() {
  const allSessions  = getSessions();
  const allR         = getAllRoutes();
  const active       = getActiveRoute();
  const activeSess   = allSessions.filter(s => s.route_id === active.id);
  const activeKm     = activeSess.reduce((s, x) => s + x.dist_km, 0);
  const totalKmAll   = allSessions.reduce((s, x) => s + x.dist_km, 0);
  const milestonesHit = (active.milestones || []).filter(m => m.km > 0 && activeKm >= m.km).length;

  const routeTotals  = new Map();
  allSessions.forEach(s => routeTotals.set(s.route_id, (routeTotals.get(s.route_id) || 0) + s.dist_km));
  const anyHalfway   = allR.some(r => (routeTotals.get(r.id) || 0) >= r.km / 2);
  const anyComplete  = allR.some(r => (routeTotals.get(r.id) || 0) >= r.km);
  const streak       = calcStreak(activeSess);

  const data = { totalSwims: allSessions.length, totalKmAll, milestonesHit, anyHalfway, anyComplete, streak };
  return BADGE_DEFS.map(b => ({ ...b, earned: b.check(data) }));
}

function renderAchievements() {
  const badges = getBadges();
  const earned = badges.filter(b => b.earned);
  let h = `<div class="section-title" style="margin-bottom:12px">Achievements</div>`;
  h += `<div class="achievements-summary">
    <strong>${earned.length}</strong> / ${badges.length} earned
  </div>`;
  badges.forEach(b => {
    h += `<div class="achievement-card card ${b.earned ? '' : 'locked'}">
      <div class="achievement-icon">${b.icon}</div>
      <div class="achievement-info">
        <div class="achievement-name">${esc(b.label)}</div>
        <div class="achievement-desc">${esc(b.desc)}</div>
        <div class="achievement-status ${b.earned ? 'earned' : 'locked'}">${b.earned ? '✓ Earned' : 'Locked'}</div>
      </div>
    </div>`;
  });
  document.getElementById('achievements-body').innerHTML = h;
}

// ── Completion modal ────────────────────────────────────────────────

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showCompletionModal(route, sessions) {
  if (document.querySelector('.completion-overlay')) return;
  const sorted = sessions.slice().sort((a, b) => a.date.localeCompare(b.date));
  const totalKm = routeTotal(route.id);
  const totalSwims = sessions.length;
  let daysText = '';
  if (sorted.length >= 2) {
    const days = Math.max(1, Math.ceil((new Date(sorted[sorted.length-1].date + 'T12:00:00') - new Date(sorted[0].date + 'T12:00:00')) / 86400000));
    daysText = `${days} day${days !== 1 ? 's' : ''}`;
  }
  const longestSwim = sessions.length ? fmtKm(Math.max(...sessions.map(s => s.dist_km))) : '—';

  const overlay = document.createElement('div');
  overlay.className = 'completion-overlay';
  overlay.setAttribute('role', 'dialog');
  overlay.setAttribute('aria-modal', 'true');
  overlay.setAttribute('aria-label', 'Route complete');
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const dismiss = () => overlay.remove();
  overlay.addEventListener('keydown', (e) => { if (e.key === 'Escape') dismiss(); });

  const modal = document.createElement('div');
  modal.className = 'completion-modal';

  modal.innerHTML = `<span class="completion-trophy">🏆</span>
    <div class="completion-title">Route Complete!</div>
    <div class="completion-route">${esc(route.emoji)} ${esc(route.name)}</div>
    <div class="completion-stats">
      <div class="completion-stat"><div class="completion-stat-val">${fmtKm(totalKm)}</div><div class="completion-stat-lbl">Distance</div></div>
      <div class="completion-stat"><div class="completion-stat-val">${totalSwims}</div><div class="completion-stat-lbl">Swims</div></div>
      ${daysText ? `<div class="completion-stat"><div class="completion-stat-val">${esc(daysText)}</div><div class="completion-stat-lbl">Duration</div></div>` : ''}
      <div class="completion-stat"><div class="completion-stat-val">${longestSwim}</div><div class="completion-stat-lbl">Longest</div></div>
    </div>
    <div class="completion-actions"></div>`;

  const actions = modal.querySelector('.completion-actions');

  if (navigator.share) {
    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn-primary btn-share-achievement';
    shareBtn.textContent = 'Share achievement';
    shareBtn.addEventListener('click', () => { shareAchievement(route); dismiss(); });
    actions.appendChild(shareBtn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-primary';
  nextBtn.textContent = 'Choose next route';
  nextBtn.addEventListener('click', () => { dismiss(); goTo('routes'); });
  actions.appendChild(nextBtn);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-secondary';
  closeBtn.textContent = 'Close';
  closeBtn.addEventListener('click', dismiss);
  actions.appendChild(closeBtn);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  closeBtn.focus();
}

function shareAchievement(route) {
  const sess = routeSessions(route.id);
  const totalKm = routeTotal(route.id);
  const text = `I completed the ${route.name}! 🏆 ${fmtKm(totalKm)} swum across ${sess.length} sessions. 🦐`;
  navigator.share({ text }).catch(() => {});
}

// ── Dark mode ────────────────────────────────────────────────────────────────

function toggleTheme() {
  const dark = document.documentElement.dataset.theme === 'dark';
  setTheme(dark ? 'light' : 'dark');
}

function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('swim_theme', t);
  const MOON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  const SUN  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  document.getElementById('theme-btn').innerHTML = t === 'dark' ? SUN : MOON;
}

(function initTheme() {
  const saved = localStorage.getItem('swim_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const t = saved || (prefersDark ? 'dark' : 'light');
  setTheme(t);
})();

// ── Init ─────────────────────────────────────────────────────────────────────

renderHome();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
